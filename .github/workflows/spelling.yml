name: Notebook Spelling Check

on: [push, pull_request]

jobs:
  spelling-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install nbformat

      - name: Install aspell
        run: sudo apt-get install -y aspell aspell-en

      - name: Check spelling
        run: |
          python3 -c "
          import nbformat, glob, sys, subprocess, re

          # Matches code blocks and inline code like \`this\`
          CODE_RE = re.compile(r'(\`\`\`.*?\`\`\`|\`.*?\`)', re.DOTALL)

          # Load ignored words from file
          try:
              with open('.github/workflows/ignore.txt') as f:
                  ignored = set(w.strip().lower() for w in f if w.strip())
          except FileNotFoundError:
              ignored = set()

          errors = []
          notebooks = [f for f in glob.glob('**/*.ipynb', recursive=True) if '.ipynb_checkpoints' not in f]

          for f in notebooks:
              print(f'Checking {f}...')
              try:
                  with open(f, 'r', encoding='utf-8') as nb_file:
                      nb = nbformat.read(nb_file, as_version=4)
              except Exception as e:
                  print(f'  ! Could not read {f}: {e}')
                  continue

              for i, cell in enumerate(nb.cells):
                  if cell.cell_type != 'markdown':
                      continue
                  
                  # Remove code blocks AND inline backticks
                  clean_content = CODE_RE.sub('', cell.source)
                  
                  result = subprocess.run(
                      ['aspell', 'list', '--lang=en'],
                      input=clean_content,
                      capture_output=True, text=True, encoding='utf-8'
                  )
                  
                  misspelled = [
                      w for w in result.stdout.strip().splitlines()
                      if w.lower() not in ignored and len(w) > 1
                  ]
                  
                  if misspelled:
                      for word in sorted(set(misspelled)):
                          errors.append(f'{f} cell {i+1}: \"{word}\"')
                          print(f'  ✗ cell {i+1}: \"{word}\"')

          print(f'---')
          print(f'{len(errors)} spelling errors in {len(notebooks)} notebooks')
          sys.exit(1 if errors else 0)
          "
