- name: Extract and check spelling
        run: |
          python -c "
          import nbformat, glob, sys, subprocess

          # load ignored words
          with open('.github/workflows/spelling/ignore.txt') as f:
              ignored = set(w.strip().lower() for w in f if w.strip())

          errors = []
          notebooks = [
              f for f in glob.glob('**/*.ipynb', recursive=True)
              if '.ipynb_checkpoints' not in f
          ]

          for f in notebooks:
              print(f'Checking {f}...')
              nb = nbformat.read(open(f), as_version=4)
              for i, cell in enumerate(nb.cells):
                  if cell.cell_type != 'markdown':
                      continue
                  with open('/tmp/cell.txt', 'w') as tmp:
                      tmp.write(cell.source)
                  result = subprocess.run(
                      ['aspell', 'list', '--lang=en'],
                      stdin=open('/tmp/cell.txt'),
                      capture_output=True, text=True
                  )
                  misspelled = [
                      w for w in result.stdout.strip().splitlines()
                      if w.lower() not in ignored
                  ]
                  if misspelled:
                      for word in misspelled:
                          errors.append(f'{f} cell {i+1}: \"{word}\"')
                          print(f'  ✗ cell {i+1}: \"{word}\"')

          print(f'---')
          print(f'{len(errors)} spelling errors in {len(notebooks)} notebooks')
          sys.exit(len(errors))
          "
