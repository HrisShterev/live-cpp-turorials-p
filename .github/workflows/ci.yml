name: Notebook CI

on: [push, pull_request]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install nbformat

      - name: Validate notebook format
        run: |
          python -c "
          import nbformat, glob, sys
          errors = []
          notebooks = [
              f for f in glob.glob('**/*.ipynb', recursive=True)
              if '.ipynb_checkpoints' not in f
          ]
          if not notebooks:
              print('No notebooks found!')
              sys.exit(1)
          for f in notebooks:
              print(f'Checking {f}...')
              try:
                  nbformat.validate(nbformat.read(open(f), as_version=4))
                  print(f'  ✓ ok')
              except Exception as e:
                  print(f'  ✗ failed: {e}')
                  errors.append(f'{f}: {e}')
          print(f'---')
          print(f'{len(errors)} errors in {len(notebooks)} notebooks')
          sys.exit(len(errors))
          "
